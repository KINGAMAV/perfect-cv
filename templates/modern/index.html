<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template CV Moderne</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Styles spécifiques pour l'impression PDF */
        @media print {
            body { background: white; }
            .no-print { display: none; }
        }
        .cv-container {
            width: 210mm; /* Format A4 */
            min-height: 297mm;
            padding: 20mm;
            margin: auto;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-gray-100 py-10">
    <div class="cv-container shadow-2xl">
        <!-- Header -->
        <header class="border-b-4 border-indigo-600 pb-6 mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-bold text-gray-900 uppercase tracking-tight">{{fullName}}</h1>
                <p class="text-xl text-indigo-600 font-semibold mt-1">{{title}}</p>
            </div>
            <div class="text-right text-sm text-gray-600">
                <p>{{email}}</p>
                <p>{{phone}}</p>
            </div>
        </header>

        <div class="grid grid-cols-3 gap-10">
            <!-- Sidebar -->
            <div class="col-span-1">
                <!-- Profil -->
                <section class="mb-8">
                    <h2 class="text-lg font-bold text-gray-900 uppercase border-b border-gray-300 mb-3">Profil</h2>
                    <p class="text-sm text-gray-700 leading-relaxed">
                        {{summary}}
                    </p>
                </section>

                <!-- Compétences -->
                <section class="mb-8">
                    <h2 class="text-lg font-bold text-gray-900 uppercase border-b border-gray-300 mb-3">Compétences</h2>
                    <ul class="text-sm text-gray-700 space-y-1">
                        {{skillsHtml}}
                    </ul>
                </section>

                <!-- Langues -->
                <section>
                    <h2 class="text-lg font-bold text-gray-900 uppercase border-b border-gray-300 mb-3">Langues</h2>
                    <ul class="text-sm text-gray-700 space-y-1">
                        <li>Français (Maternel)</li>
                        <li>Anglais (Avancé)</li>
                    </ul>
                </section>
            </div>

            <!-- Main Content -->
            <div class="col-span-2">
                <!-- Expériences -->
                <section class="mb-8">
                    <h2 class="text-lg font-bold text-gray-900 uppercase border-b border-gray-300 mb-4">Expériences Professionnelles</h2>
                    <div class="space-y-6">
                        {{expHtml}}
                    </div>
                </section>

                <!-- Formations -->
                <section>
                    <h2 class="text-lg font-bold text-gray-900 uppercase border-b border-gray-300 mb-4">Formations</h2>
                    <div class="space-y-4">
                        {{eduHtml}}
                    </div>
                </section>
            </div>
        </div>
    </div>
</body>
</html>
